<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Vị Ngon — Liên Hệ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/contact.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main>
      <section class="page-hero">
        <div class="container">
          <p class="section-label">Kết nối với chúng tôi</p>
          <h1 class="section-title">Liên Hệ</h1>
          <div class="divider-gold"></div>
          <p class="page-hero-desc">Chúng tôi sẵn sàng lắng nghe bạn.</p>
        </div>
      </section>
      <section class="contact-section">
        <div class="contact-info">
          <div class="info-item">
            <div class="info-icon">
              <img src="../images/contact-dia-chi.jpg" alt="Address" />
            </div>
            <div class="info-text">
              <a href="https://maps.app.goo.gl/okcmNnH1BtmJ7JXNA">ĐỊA CHỈ</a>
              <p>123 Đường Ẩm Thực, Q.1, TP. HCM</p>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">
              <img src="../images/contact-dien-thoai.jpg" alt="" />
            </div>
            <div class="info-text">
              <a href="tel:+84901234567">ĐIỆN THOẠI</a>
              <p>0901 234 567</p>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">
              <img src="../images/contact-email.jpg" alt="Email" />
            </div>
            <div class="info-text">
              <a href="mailto:info@vingon.vn">EMAIL</a>
              <p>info@vingon.vn</p>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">
              <img src="../images/contact-dong-ho.jpg" alt="time" />
            </div>
            <div class="info-text">
              <h3>GIỜ MỞ CỬA</h3>
              <p>T2 – T5: 10:00 – 22:00</p>
              <p>T6 – T7: 10:00 – 23:00</p>
              <p>Chủ Nhật: 10:00 – 21:00</p>
            </div>
          </div>
        </div>
        <div class="contact-form-container">
          <form class="contact-form">
            <h3>Góp ý</h3>
            <div class="divider-gold"></div>
            <div class="form-group">
              <label for="fullname"
                >Họ và tên <span class="required">*</span></label
              >
              <input
                type="text"
                id="fullname"
                placeholder="Nhập họ và tên"
                required
              />
            </div>
            <div class="form-group">
              <label for="email">Email <span class="required">*</span></label>
              <input
                type="email"
                id="email"
                placeholder="Nhập email"
                required
              />
            </div>
            <div class="form-group">
              <label for="subject">Chủ đề</label>
              <select name="subject" size="1" id="subject" required>
                <option value="response">--Chọn chủ đề liên hệ--</option>
                <option value="response">Phản hồi</option>
                <option value="coopearation">Hợp tác</option>
              </select>
            </div>
            <div class="form-group">
              <label for="message"
                >Nội dung <span class="required">*</span></label
              >
              <textarea
                id="message"
                placeholder="Nhập nội dung"
                required
              ></textarea>
            </div>
            <button type="submit" class="btn-primary btn-submit">GỬI</button>
          </form>
        </div>
      </section>
      <section class="contact-map">
        <div class="container">
          <div class="map-wrapper">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d2012161.0889912995!2d106.23892140000001!3d9.93378005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sQ.1%2C%20TP.%20HCM!5e0!3m2!1svi!2s!4v1781432459920!5m2!1svi!2s"
              width="100%"
              height="450"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
            ></iframe>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="../js/shared.js"></script>
    <script src="../js/contact.js"></script>
  </body>
</html>
