<!--
      Trang: favorite.html - Trang Món Yêu Thích
      Chức năng: hiển thị lại các món khách đã bấm ♥ ở trang Thực Đơn,
      tính tổng tiền dự kiến, và cho phép chuyển sang trang Đặt Bàn kèm
      theo TÊN CÁC MÓN đã chọn qua query-string (?dishes=...).
      Người viết: MSSV B2405536 - Họ tên: Nguyễn Bảo Tín
      Liên kết logic với: js/favorite.js (đọc trực tiếp object đầy đủ
      thông tin món ăn đã lưu sẵn trong localStorage bởi menu.js
    -->
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vị Ngon Fine Dining — Món Yêu Thích</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/shared.css" />
    <!-- Dùng lại style thẻ món ăn (.menu-item, .menu-info...) từ menu.css,
         để giao diện món ăn ở đây GIỐNG HỆT bên trang Thực Đơn, không
         phải viết lại CSS trùng lặp -->
    <link rel="stylesheet" href="../css/menu.css" />
    <link rel="stylesheet" href="../css/favorite.css" />
    <link rel="stylesheet" href="../css/debug-outline.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main>
      <section class="page-hero">
        <div class="container">
          <p class="section-label">Đã Lưu</p>
          <h1 class="section-title">Món Yêu Thích</h1>
          <div class="divider-gold"></div>
          <p class="page-hero-desc">
            Xem lại các món bạn đã thích để dễ gọi món khi đến bàn
          </p>
        </div>
      </section>

      <section class="favorite-section">
        <div class="container">
          <!-- Thông báo hiển thị khi CHƯA thích món nào - favorite.js ẩn/hiện
               khối này tuỳ theo localStorage có dữ liệu hay không -->
          <div class="empty-favorite-state hidden" id="empty-state">
            <p>Bạn chưa thích món nào.</p>
            <a href="/pages/menu.html" class="btn-outline">Xem Thực Đơn</a>
          </div>

          <!-- Khung chứa danh sách món yêu thích - favorite.js render động
               vào đây, tái sử dụng đúng cấu trúc .menu-item của menu.css -->
          <div class="menu-grid" id="favorite-grid"></div>

          <!-- Thanh tổng kết: tổng số món + tổng tiền + nút chuyển sang Đặt Bàn.
               Chỉ hiện khi có ít nhất 1 món yêu thích. -->
          <div class="favorite-checkout hidden" id="favorite-checkout">
            <div class="favorite-checkout-info">
              <span id="favorite-count-text">0 món</span>
              <span class="favorite-checkout-total" id="favorite-total-text">0₫</span>
            </div>
            <a href="#" class="btn-primary" id="btn-go-reserve">Đặt Bàn Với Các Món Này</a>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="../js/shared.js"></script>
    <script src="../js/favorite.js"></script>
  </body>
</html>
