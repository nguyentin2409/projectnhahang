<!--
      Trang: menu.html - Trang Thực Đơn nhà hàng
      Chức năng: hiển thị danh sách món ăn (RENDER ĐỘNG từ js/menu-data.js,
      không viết cứng HTML), cho phép lọc theo danh mục, và bấm ♥ để thêm/
      bớt "Món Yêu Thích" (xem chi tiết + tổng tiền ở trang riêng
      pages/favorite.html).
      Người viết: MSSV B2405536 - Họ tên: Nguyễn Bảo Tín
      Liên kết logic với: css/menu.css (giao diện), js/menu-data.js (dữ liệu
      món ăn dùng chung với favorite.html) và js/menu.js (render + lọc + yêu thích)
    -->
<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vị Ngon Fine Dining — Thực Đơn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/menu.css" />
    <link rel="stylesheet" href="../css/debug-outline.css" />
  </head>
  <body>
    <!-- Vùng chèn header dùng chung, được JS (shared.js) tự động render vào đây -->
    <div id="site-header"></div>
    <main>
      <!-- Khối giới thiệu đầu trang (hero) -->
      <section class="page-hero">
        <div class="container">
          <p class="section-label">Khám Phá</p>
          <h1 class="section-title">Thực Đơn</h1>
          <div class="divider-gold"></div>
          <p class="page-hero-desc">
            9 món ăn được chắt lọc từ tinh hoa ẩm thực ba miền
          </p>
        </div>
      </section>
      <section class="menu-section">
        <div class="container">
          <!-- Thanh tab lọc món ăn theo danh mục: data-category khớp với
               data-category của từng .menu-item do menu.js render ra bên dưới -->
          <div class="menu-tabs" id="menu-tabs">
            <button class="tab-btn active" data-category="all">Tất Cả</button>
            <button class="tab-btn" data-category="appetizer">Khai Vị</button>
            <button class="tab-btn" data-category="main">Món Chính</button>
            <button class="tab-btn" data-category="soup">Súp & Canh</button>
            <button class="tab-btn" data-category="dessert">Tráng Miệng</button>
            <button class="tab-btn" data-category="drink">Đồ Uống</button>
          </div>

          <!--
            Khung RỖNG - menu.js sẽ đọc mảng MENU_ITEMS (trong menu-data.js)
            rồi tự tạo (render) từng thẻ .menu-item bên trong div này bằng
            JavaScript, KHÔNG viết cứng HTML từng món như bản trước.
            Kỹ thuật này giống Ví dụ 4.6 (BGR) - render danh sách từ dữ liệu.
          -->
          <div class="menu-grid" id="menu-grid"></div>
        </div>
      </section>
    </main>
    <!-- Vùng chèn footer dùng chung, được JS (shared.js) tự động render vào đây -->
    <div id="site-footer"></div>
    <!-- shared.js: render header/footer, xử lý menu di động, hiệu ứng cuộn, badge yêu thích (dùng chung mọi trang) -->
    <script src="../js/shared.js"></script>
    <!-- menu-data.js: mảng dữ liệu 9 món ăn - PHẢI nạp TRƯỚC menu.js vì menu.js cần dùng MENU_ITEMS -->
    <script src="../js/menu-data.js"></script>
    <!-- menu.js: render danh sách món + lọc theo danh mục + chức năng yêu thích (chỉ dùng riêng cho trang này) -->
    <script src="../js/menu.js"></script>
  </body>
</html>
